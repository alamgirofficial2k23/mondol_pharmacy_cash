<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>মন্ডল ফার্মেসী - মালিকের ড্যাশবোর্ড</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Bengali', sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
  <div class="max-w-3xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-emerald-700">মন্ডল ফার্মেসী</h1>
        <p class="text-gray-500 text-sm">মালিকের ড্যাশবোর্ড (ভিউ-অনলি)</p>
      </div>
      <div id="date-label" class="text-sm text-gray-400"></div>
    </div>

    <div id="loading" class="text-center text-gray-400 py-16">লোড হচ্ছে...</div>
    <div id="error-box" class="hidden bg-red-100 text-red-700 rounded-lg px-4 py-3 mb-4"></div>

    <div id="content" class="hidden">
      <div id="closed-badge" class="hidden bg-red-100 text-red-700 text-xs font-medium px-3 py-1.5 rounded-full inline-block mb-4">🔒 আজকের হিসাব ক্লোজড</div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-blue-500">
          <div class="text-xs text-gray-500 mb-1">ওপেনিং ক্যাশ</div>
          <div class="text-lg font-bold text-gray-800" id="v-opening">—</div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-emerald-500">
          <div class="text-xs text-gray-500 mb-1">আজকের সেল</div>
          <div class="text-lg font-bold text-gray-800" id="v-sale">—</div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-orange-500">
          <div class="text-xs text-gray-500 mb-1">ঔষধ কেনা</div>
          <div class="text-lg font-bold text-gray-800" id="v-purchase">—</div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-purple-500">
          <div class="text-xs text-gray-500 mb-1">আজকের বাকী</div>
          <div class="text-lg font-bold text-gray-800" id="v-baki">—</div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-teal-500">
          <div class="text-xs text-gray-500 mb-1">বাকী পেইড</div>
          <div class="text-lg font-bold text-gray-800" id="v-bakipaid">—</div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-red-500">
          <div class="text-xs text-gray-500 mb-1">আজকের খরচ</div>
          <div class="text-lg font-bold text-gray-800" id="v-expense">—</div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-rose-500">
          <div class="text-xs text-gray-500 mb-1">ক্যাশ উত্তোলন</div>
          <div class="text-lg font-bold text-gray-800" id="v-withdrawal">—</div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-cyan-500">
          <div class="text-xs text-gray-500 mb-1">বাড়তি ক্যাশ</div>
          <div class="text-lg font-bold text-gray-800" id="v-extra">—</div>
        </div>
      </div>

      <div class="bg-emerald-700 text-white rounded-xl shadow-md p-6 flex items-center justify-between">
        <div>
          <div class="text-sm opacity-80">বর্তমান মোট ক্যাশ</div>
          <div class="text-3xl font-bold" id="v-total">—</div>
        </div>
        <div class="text-5xl opacity-30">৳</div>
      </div>

      <div class="text-center mt-6">
        <button onclick="loadSummary()" class="text-sm text-emerald-700 border border-emerald-300 rounded-lg px-4 py-2 hover:bg-emerald-50">
          🔄 রিফ্রেশ করুন
        </button>
      </div>
    </div>
  </div>

<script>
// ============================================
// এই দুটো ভ্যালু আপনার হোস্টিং অনুযায়ী পরিবর্তন করুন
// API_BASE = আপনার ডোমেইনে হোস্ট করা api/today_summary.php এর সম্পূর্ণ URL (যেমন https://yourdomain.com/api)
// API_KEY  = api/config.php তে সেট করা একই সিক্রেট কী
// ============================================
const API_BASE = "https://cash.shohozvibe.com/api";
const API_KEY = "d9a4f7c1e8b2a6f3c0d5e9a1b7f4c8d2e6a9c3f1b5d7e0a4c8f2b6d1e9a3c7f5b8d0e2a6c1f9b4d7e3a8c5f0b2d6e1";

function fmt(n) {
  return "৳" + Number(n).toLocaleString("en-BD", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

async function loadSummary() {
  const loading = document.getElementById("loading");
  const content = document.getElementById("content");
  const errorBox = document.getElementById("error-box");
  loading.classList.remove("hidden");
  content.classList.add("hidden");
  errorBox.classList.add("hidden");

  try {
    const res = await fetch(`${API_BASE}/today_summary.php`, {
      headers: { "X-API-KEY": API_KEY }
    });
    if (!res.ok) throw new Error("সার্ভার থেকে ডেটা আনতে ব্যর্থ (status " + res.status + ")");
    const data = await res.json();

    document.getElementById("date-label").textContent = data.date;
    document.getElementById("v-opening").textContent = fmt(data.opening_cash);
    document.getElementById("v-sale").textContent = fmt(data.sale);
    document.getElementById("v-purchase").textContent = fmt(data.purchase);
    document.getElementById("v-baki").textContent = fmt(data.baki);
    document.getElementById("v-bakipaid").textContent = fmt(data.baki_paid);
    document.getElementById("v-expense").textContent = fmt(data.expense);
    document.getElementById("v-withdrawal").textContent = fmt(data.withdrawal);
    document.getElementById("v-extra").textContent = fmt(data.extra_cash);
    document.getElementById("v-total").textContent = fmt(data.total_cash);
    document.getElementById("closed-badge").classList.toggle("hidden", !data.is_closed);

    loading.classList.add("hidden");
    content.classList.remove("hidden");
  } catch (err) {
    loading.classList.add("hidden");
    errorBox.textContent = "ত্রুটি: " + err.message;
    errorBox.classList.remove("hidden");
  }
}

loadSummary();
// প্রতি ৬০ সেকেন্ডে অটো-রিফ্রেশ
setInterval(loadSummary, 60000);
</script>
</body>
</html>
